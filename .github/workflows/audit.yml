name: Audit Casks

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew tap QuartzInkStudio/tap "$GITHUB_WORKSPACE"
          brew trust QuartzInkStudio/tap
          brew audit --cask --online tuck-menu-bar facet peekmark
